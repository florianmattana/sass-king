name: Correction
description: Report an error in existing content (FINDINGS, conclusions, reference docs)
title: "[FIX] brief description"
labels: ["contribution: correction"]
body:
  - type: input
    id: file_path
    attributes:
      label: File path
      placeholder: "corpus/basics/05_fixed_loop/conclusion05.md"
    validations:
      required: true

  - type: textarea
    id: current_text
    attributes:
      label: Current text
      description: Quote the exact sentence or passage that is incorrect
    validations:
      required: true

  - type: textarea
    id: proposed_text
    attributes:
      label: Proposed correction
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: SASS line, NCU metric, official documentation reference, or microbenchmark result
    validations:
      required: true
